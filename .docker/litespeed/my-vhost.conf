# =============================================================================
# 🚀 Configuración de Virtual Host Optimizada
# =============================================================================
# ✅ Descripción:
#   Configuración optimizada de virtual host para WordPress y Laravel
#   con todas las optimizaciones de rendimiento y seguridad.
# =============================================================================

docRoot                   /var/www/vhosts/$VH_NAME/html/
vhDomain                  $VH_NAME
vhAliases                 www.$VH_NAME
adminEmails               admin@$VH_NAME
enableGzipCompression     1
enableIpGeo               1

# =============================================================================
# 🔧 CONFIGURACIÓN DE PHP
# =============================================================================
phpIniOverride {
    # Configuración de memoria y límites
    php_admin_value[memory_limit] = 512M
    php_admin_value[max_execution_time] = 300
    php_admin_value[max_input_time] = 300
    php_admin_value[upload_max_filesize] = 128M
    php_admin_value[post_max_size] = 128M
    php_admin_value[max_input_vars] = 5000
    
    # Configuración de fechas
    php_admin_value[date.timezone] = America/Lima
    php_admin_value[default_charset] = UTF-8
    
    # Configuración de OPcache
    php_admin_value[opcache.enable] = 1
    php_admin_value[opcache.memory_consumption] = 128
    php_admin_value[opcache.max_accelerated_files] = 10000
    php_admin_value[opcache.validate_timestamps] = 1
    php_admin_value[opcache.revalidate_freq] = 2
    php_admin_value[opcache.save_comments] = 1
    
    # Configuración de sesiones
    php_admin_value[session.auto_start] = 0
    php_admin_value[session.cookie_httponly] = 1
    php_admin_value[session.cookie_secure] = 0
    php_admin_value[session.use_strict_mode] = 1
    
    # Configuración de seguridad
    php_admin_value[expose_php] = Off
    php_admin_value[allow_url_fopen] = 1
    php_admin_value[allow_url_include] = 0
}

# =============================================================================
# 🚀 CONFIGURACIÓN DE RENDIMIENTO
# =============================================================================
# Configuración de caché
enableGzipCompression      1
gzipCompressLevel         6
gzipMinFileSize           1000
gzipMaxFileSize           1000000

# Configuración de headers
addDefaultCharset         off
enableIpGeo               1
geoipDBFile               /usr/share/GeoIP/GeoIP.dat

# =============================================================================
# 🔒 CONFIGURACIÓN DE SEGURIDAD
# =============================================================================
# Headers de seguridad
extraHeaders               <<<END_extraHeaders
X-Content-Type-Options: nosniff
X-Frame-Options: SAMEORIGIN
X-XSS-Protection: 1; mode=block
Referrer-Policy: strict-origin-when-cross-origin
END_extraHeaders

# =============================================================================
# 📁 CONFIGURACIÓN DE DIRECTORIOS
# =============================================================================
# Configuración de directorios protegidos
context / {
    type                    static
    docRoot                 /var/www/vhosts/$VH_NAME/html/
    extraHeaders            <<<END_extraHeaders
    Cache-Control: public, max-age=31536000
    END_extraHeaders
}

# Configuración para archivos PHP
context / {
    type                    php
    docRoot                 /var/www/vhosts/$VH_NAME/html/
    phpIniOverride         {
        php_admin_value[memory_limit] = 512M
        php_admin_value[max_execution_time] = 300
    }
}

# Configuración para WordPress
context /wp-admin/ {
    type                    php
    docRoot                 /var/www/vhosts/$VH_NAME/html/
    phpIniOverride         {
        php_admin_value[memory_limit] = 512M
        php_admin_value[max_execution_time] = 300
    }
}

# Configuración para Laravel
context /public/ {
    type                    php
    docRoot                 /var/www/vhosts/$VH_NAME/html/public/
    phpIniOverride         {
        php_admin_value[memory_limit] = 512M
        php_admin_value[max_execution_time] = 300
    }
}
